<!DOCTYPE html>
<html>
<head>
    <title>Bounty Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="nav-left">
            <a href="index.html">Dashboard</a>
            <a href="#">Tasks</a>
            <a href="#">Leaderboard</a>
        </div>

        <div class="nav-center">
            🏴‍☠️ Bounty Hunter
        </div>

        <div class="nav-right">
            <span id="nav-username"></span>
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
            <button id="logout-btn" hidden>Logout</button>
        </div>
    </nav>


    <!-- Bounty Section-->
    <div class="container">
        <h1>🏴‍☠️ Bounty Hunter</h1>

        <div class="bounty-box">
            <h2>Your Bounty</h2>
            <h2 id="bounty"></h2>
            <h3 id= "total-bounty"></h3>
            <h3 id= "level"></h3>
            <h3 id = "streak"></h3>
        </div>
        <div class="progress-container">
            <div class="progress-header">
                <span>Progress to Next Rank</span>
                <span id="progress-text">0%</span>
            </div>

            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div class="tasks-box">
            <h2>Create Task</h2>

            <form id="create-task-form">
                <input type="text" id="name" placeholder="Task Name" required />
                <input type="text" id="description" placeholder="Description" required />
                
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>

                <input type="number" id="reward" placeholder="Reward" required />

                <select id="category" required>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Study">Study</option>
                    <option value="Health">Health</option>
                    <option value="Finance">Finance</option>
                    <option value="Errands">Errands</option>
                    <option value="Home">Home</option>
                    <option value="Other" selected>Other</option>
                </select>

                <button type="submit">Add Task</button>
            </form>

            <h2>Tasks</h2>
            <!-- Filter buttons -->
             <div class="filter-buttons">
                <button type="button" data-filter="all">All</button>
                <button type="button" data-filter="completed">Completed</button>
                <button type="button" data-filter="incomplete">Incomplete</button>
            </div>

            <!-- Sort buttons -->
             <div class="sort-buttons">
                <button type="button" data-sort="reward">Sort by Reward</button>
                <button type="button" data-sort="difficulty">Sort by Difficulty</button>
             </div>

            <!-- Search -->
            <input type = "text" id = "search" placeholder = "Search tasks...">

            <!-- Category Filter -->
            <div class="category-filter">
                <button type="button" data-category="All">All</button>
                <button type="button" data-category="Personal">Personal</button>
                <button type="button" data-category="Work">Work</button>
                <button type="button" data-category="Study">Study</button>
                <button type="button" data-category="Health">Health</button>
                <button type="button" data-category="Finance">Finance</button>
                <button type="button" data-category="Errands">Errands</button>
                <button type="button" data-category="Home">Home</button>
                <button type="button" data-category="Other">Other</button>
            </div>

            <ul id="task-list"></ul>
        </div>
    </div>

    <script type = "module" src="script.js"></script>
</body>
</html>
