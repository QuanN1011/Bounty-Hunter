<!DOCTYPE html>
<html>
<head>
    <title>Bounty Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="login-box">
        <h2>Login</h2>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button type="button" id="login-btn">Login</button>
    </div>
    <button type="button" id="logout-btn">Logout</button>

    <div class="container">
        <h1>🏴‍☠️ Bounty Hunter</h1>

        <div class="bounty-box">
            <h2>Your Bounty</h2>
            <h2 id="bounty"></h2>
            <h3 id= "total-bounty"></h3>
            <h3 id= "level"></h3>
        </div>
        <div class="progress-container">
            <div class="progress-header">
                <span>Progress to Next Rank</span>
                <span id="progress-text">0%</span>
            </div>

            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="tasks-box">
            <h2>Create Task</h2>

            <form id="create-task-form">
                <input type="text" id="name" placeholder="Task Name" required />
                <input type="text" id="description" placeholder="Description" required />
                
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>

                <input type="number" id="reward" placeholder="Reward" required />

                <button type="submit">Add Task</button>
            </form>

            <h2>Tasks</h2>
            <!-- Filter buttons -->
             <div class="filter-buttons">
                <button type="button" data-filter="all">All</button>
                <button type="button" data-filter="completed">Completed</button>
                <button type="button" data-filter="incomplete">Incomplete</button>
            </div>

            <!-- Sort buttons -->
             <div class="sort-buttons">
                <button type="button" data-sort="reward">Sort by Reward</button>
                <button type="button" data-sort="difficulty">Sort by Difficulty</button>
             </div>

            <!-- Search -->
            <input type = "text" id = "search" placeholder = "Search tasks...">

            <ul id="task-list"></ul>
        </div>
    </div>

    <script type = "module" src="script.js"></script>
</body>
</html>
