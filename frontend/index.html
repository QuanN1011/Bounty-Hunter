<!DOCTYPE html>
<html>
<head>
    <title>Bounty Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🏴‍☠️ Bounty Hunter</h1>

        <div class="bounty-box">
            <h2>Your Bounty</h2>
            <p id="bounty">0</p>
        </div>

        <div class="tasks-box">
            <h2>Create Task</h2>

            <form id="create-task-form">
                <input type="text" id="name" placeholder="Task Name" required />
                <input type="text" id="description" placeholder="Description" required />
                
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>

                <input type="number" id="reward" placeholder="Reward" required />

                <button type="submit">Add Task</button>
            </form>

            <h2>Tasks</h2>
            <!-- Filter buttons -->
             <div class = "filter-buttons">
                <button onclick = "setFilter('all')">All</button>
                <button onclick = "setFilter('completed')">Completed</button>
                <button onclick = "setFilter('incomplete')">Incomplete</button>

            <!-- Sort buttons -->
             <div class = "sort-buttons">
                <button onclick = "setSort('reward')">Sort by Reward</button>
                <button onclick = "setSort('difficulty')">Sort by Difficulty</button>
             </div>

            <!-- Search -->
            <input type = "text" id = "search" placeholder = "Search tasks...">

            <ul id="task-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
