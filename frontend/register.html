<!DOCTYPE html>
<html>
<head>
    <title>Register - Bounty Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Create Account</h2>

            <form id="register-form">
                <input id="register-username" placeholder="Username" autocomplete="username">
                <input id="register-password" type="password" placeholder="Password" autocomplete="new-password">
                <button type="submit" id="register-btn">Register</button>
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>

<script type="module" src="script.js"></script>

</body>
</html>
